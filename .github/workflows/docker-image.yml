name: Build & Publish Guix Dev Docker Image

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  # Build whenever the system config or the build script changes.
  push:
    branches:
      - master
    paths:
      - '.github/guix-dev-docker.scm'
      - '.github/bin/build-guix-docker.scm'
      - '.github/workflows/docker-image.yml'

  # Allow manual/on-demand builds from the Actions UI.
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push the image to ghcr.io after building'
        required: false
        default: 'true'
        type: boolean

# ---------------------------------------------------------------------------
# Permissions needed to push to GitHub Container Registry
# ---------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/guix-dev
  # The existing guix-dev image is used as the build environment.
  # 'guix system image --image-type=docker' is executed inside this
  # container so that no Guix installation is needed on the runner itself.
  BUILDER_IMAGE: ghcr.io/kromka-chleba/guix-dev:latest

jobs:
  build-docker-image:
    name: Build Guix dev Docker image
    # A standard GitHub-hosted runner is sufficient: Docker is available out
    # of the box and the Guix build is performed inside the existing guix-dev
    # container (see the "Start build container" step below).
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Pull the existing guix-dev image and use it as the build environment.
      # The container is started with --privileged so that the Guix daemon can
      # use Linux namespaces for isolated builds.
      # -----------------------------------------------------------------------
      - name: Pull Guix build environment
        run: docker pull "${{ env.BUILDER_IMAGE }}"

      - name: Start Guix build container
        run: |
          CONTAINER_ID=$(docker run -d --privileged \
            --volume "$(pwd):/workspace:ro" \
            "${{ env.BUILDER_IMAGE }}")
          echo "BUILDER_CONTAINER=${CONTAINER_ID}" >> "$GITHUB_ENV"

      - name: Wait for Shepherd and start Guix daemon
        run: |
          # Poll until Shepherd (PID 1) has finished booting (up to 60 s).
          for i in $(seq 1 30); do
            if docker exec "${BUILDER_CONTAINER}" \
                 /run/current-system/profile/bin/herd status \
                 >/dev/null 2>&1; then
              echo "Shepherd is ready."
              break
            fi
            sleep 2
          done
          # The guix-daemon is stopped by default in the image; start it now.
          docker exec "${BUILDER_CONTAINER}" \
            /run/current-system/profile/bin/herd start guix-daemon

      # -----------------------------------------------------------------------
      # Build the tarball with 'guix system image --image-type=docker'.
      # Build progress goes to stderr (visible in the Actions log) and the
      # resulting store path is printed to stdout (captured in $TARBALL).
      # -----------------------------------------------------------------------
      - name: Build Docker image tarball
        run: |
          TARBALL=$(docker exec "${BUILDER_CONTAINER}" \
            /run/current-system/profile/bin/guix system image \
            --image-type=docker \
            /workspace/.github/guix-dev-docker.scm)
          if [ -z "${TARBALL}" ]; then
            echo "ERROR: 'guix system image' produced no output." >&2
            exit 1
          fi
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          echo "Tarball produced at: ${TARBALL}"

      # -----------------------------------------------------------------------
      # Extract the tarball from the container's Guix store onto the runner's
      # filesystem, then stop the container.
      # -----------------------------------------------------------------------
      - name: Extract tarball from container
        run: |
          docker cp "${BUILDER_CONTAINER}:${TARBALL}" ./guix-dev-image.tar.gz
          echo "Tarball size: $(du -sh ./guix-dev-image.tar.gz | cut -f1)"

      - name: Stop build container
        if: always()
        run: |
          docker stop "${BUILDER_CONTAINER}" >/dev/null || true
          docker rm   "${BUILDER_CONTAINER}" >/dev/null || true

      # -----------------------------------------------------------------------
      # Load the tarball and tag it
      # -----------------------------------------------------------------------
      - name: Load image into Docker
        id: load
        run: |
          # 'docker load' outputs either:
          #   "Loaded image: <name>:<tag>"  – when the tarball contains repo tags
          #   "Loaded image ID: sha256:..."  – when no repo tags are present
          # Guix system image tarballs typically carry no tags, so we must
          # handle both formats.
          LOADED=$(docker load -i ./guix-dev-image.tar.gz \
            | grep -oP '(?<=Loaded image( ID)?: ).*' || true)
          if [ -z "${LOADED}" ]; then
            # Fallback: use the ID of the most recently loaded image.
            LOADED=$(docker images -q | head -1)
          fi
          if [ -z "${LOADED}" ]; then
            echo "ERROR: could not determine the loaded image tag/ID." >&2
            exit 1
          fi
          echo "loaded_tag=${LOADED}" >> "$GITHUB_OUTPUT"

      - name: Tag image
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker tag "${{ steps.load.outputs.loaded_tag }}" "${IMAGE_TAG}:latest"
          docker tag "${{ steps.load.outputs.loaded_tag }}" "${IMAGE_TAG}:${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Push to GitHub Container Registry
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == true }}
        run: |
          docker push "${IMAGE_TAG}:latest"
          docker push "${IMAGE_TAG}:${SHORT_SHA}"
          echo "Pushed ${IMAGE_TAG}:latest and ${IMAGE_TAG}:${SHORT_SHA}"
