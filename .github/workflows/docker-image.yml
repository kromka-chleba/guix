name: Guix Dev Docker Image

# NOT official Guix project CI.
# Personal workflow for the kromka-chleba/guix development branch.
#
# This workflow builds a Guix Docker image from the system configuration in
# .github/docker/guix-dev-system.scm using `guix system image --image-type=docker`,
# then publishes the result to GHCR (ghcr.io/kromka-chleba/guix-dev).
#
# Bootstrap model:
#   - Steady state: the previously published GHCR image is used as the
#     build environment for the next image.
#   - First-time / recovery: build and push manually, then re-run this workflow.
#     See .github/README-docker.md for instructions.

on:
  push:
    branches:
      - docker-github-ci
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/guix-dev
  SYSTEM_CONFIG: .github/docker/guix-dev-system.scm

jobs:
  build-and-publish:
    name: Build Guix Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Pull the bootstrap image that will be used to run guix system image.
      # In steady state this is the previously published image.
      # On first bootstrap, this step will fail; see README-docker.md.
      # ------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull bootstrap image (if available)
        id: pull_bootstrap
        run: |
          if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null; then
            echo "bootstrap_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrap_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No bootstrap image found in GHCR. See .github/README-docker.md for first-time bootstrap instructions."
          fi

      # ------------------------------------------------------------------
      # Prepare the dev environment inside the bootstrap container so that
      # ./pre-inst-env is available for the build step.
      #
      # The Guix Docker image uses an Entrypoint of [boot-program, os-path].
      # `docker run IMAGE cmd` appends cmd to the Entrypoint rather than
      # replacing it, so boot-program boots the Guix system and ignores the
      # extra arguments — the command never runs.
      #
      # Correct pattern: create + start the container (letting Guix activate
      # and Shepherd come up), then use `docker exec` to run commands inside
      # the already-booted container.
      #
      # We use `guix shell -D guix` to obtain the full development environment
      # for the guix package (all build inputs, correct environment variables
      # such as ACLOCAL_PATH, PKG_CONFIG_PATH, etc.).  Without this wrapper
      # ./configure and make will fail because the required macros and
      # libraries are not on the standard search paths.
      # ------------------------------------------------------------------
      - name: Prepare dev environment (bootstrap, configure, make)
        run: |
          if [ "${{ steps.pull_bootstrap.outputs.bootstrap_available }}" = "true" ]; then
            CNAME="guix-dev-prep"
            docker rm -f "$CNAME" 2>/dev/null || true
            docker create \
              --name "$CNAME" \
              --privileged \
              -v "$PWD:/workspace" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker start "$CNAME"
            # Wait for guix-daemon to be available (up to 120 seconds).
            .github/docker/wait-for-daemon.sh "$CNAME"
            # Run bootstrap, configure and make inside the guix development
            # environment so that all build inputs and search paths are set up
            # correctly (ACLOCAL_PATH, PKG_CONFIG_PATH, …).
            docker exec -w /workspace "$CNAME" \
              /bin/sh -c 'export PATH=/run/current-system/profile/bin:$PATH
                     set -ex
                     guix shell -D guix -- sh -c "
                       ./bootstrap
                       ./configure --localstatedir=/var
                       make -j$(nproc) V=1
                     "'
            docker stop "$CNAME"
            docker rm   "$CNAME"
          else
            echo "::error::No bootstrap image available. Build the image manually and push it. See .github/README-docker.md."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Build the image inside the bootstrap container.
      # guix system image --image-type=docker produces a from-scratch image;
      # it does NOT use a pre-existing Docker base image.
      #
      # Same create+start+exec+stop pattern as the prep step above; see the
      # comment there for why `docker run IMAGE cmd` does not work here.
      # ------------------------------------------------------------------
      - name: Build image (inside bootstrap container)
        run: |
          if [ "${{ steps.pull_bootstrap.outputs.bootstrap_available }}" = "true" ]; then
            CNAME="guix-dev-build"
            docker rm -f "$CNAME" 2>/dev/null || true
            docker create \
              --name "$CNAME" \
              --privileged \
              -v "$PWD:/workspace" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker start "$CNAME"
            # Wait for guix-daemon to be available (up to 120 seconds).
            .github/docker/wait-for-daemon.sh "$CNAME"
            docker exec -w /workspace "$CNAME" \
              /bin/sh -c 'export PATH=/run/current-system/profile/bin:$PATH
                     set -ex
                     ./pre-inst-env guile .github/docker/build-image.scm \
                       --system-config ${{ env.SYSTEM_CONFIG }} \
                       --output guix-system-docker-image.tar.gz \
                       --no-load'
            docker stop "$CNAME"
            docker rm   "$CNAME"
          else
            echo "::error::No bootstrap image available. Build the image manually and push it. See .github/README-docker.md."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Load the tarball into Docker and tag it.
      # ------------------------------------------------------------------
      - name: Load and tag image
        run: |
          IMAGE_ID="$(docker load < guix-system-docker-image.tar.gz \
                        | awk '/Loaded image/{print $NF}')"
          echo "Loaded image: $IMAGE_ID"
          docker tag "$IMAGE_ID" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag "$IMAGE_ID" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ------------------------------------------------------------------
      # The test script is a Guile program run on the host runner.
      # ------------------------------------------------------------------
      - name: Install Guile on runner
        run: sudo apt-get install -y --no-install-recommends guile-3.0

      # ------------------------------------------------------------------
      # Smoke-test the freshly built image.
      # ------------------------------------------------------------------
      - name: Test image
        run: |
          guile .github/docker/test-image.scm \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ------------------------------------------------------------------
      # Publish only on pushes to master (not PRs).
      # ------------------------------------------------------------------
      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Published ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Published ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
