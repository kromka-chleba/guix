name: Build & Publish Guix Dev Docker Image

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  # Build whenever the system config or the build script changes.
  push:
    branches:
      - master
    paths:
      - '.github/guix-dev-docker.scm'
      - '.github/bin/build-guix-docker.scm'
      - '.github/workflows/docker-image.yml'

  # Allow manual/on-demand builds from the Actions UI.
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push the image to ghcr.io after building'
        required: false
        default: 'true'
        type: boolean

# ---------------------------------------------------------------------------
# Permissions needed to push to GitHub Container Registry
# ---------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/guix-dev

jobs:
  build-docker-image:
    name: Build Guix dev Docker image
    # A standard GitHub-hosted runner is sufficient: Docker is available out
    # of the box.  The build runs inside the official guix/guix container from
    # Docker Hub, so no Guix installation on the runner itself is required and
    # there is no circular dependency on the image being published here.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Pull the official GNU Guix package-manager image from Docker Hub.
      # This image provides a ready-to-use Guix installation (guix-daemon,
      # build users, substitute servers pre-configured) and is maintained by
      # the Guix project.
      # -----------------------------------------------------------------------
      - name: Pull Guix bootstrap image
        run: docker pull guix/guix

      # -----------------------------------------------------------------------
      # Run the entire build inside a single docker run invocation.
      #
      # How it works:
      #   1. The guix/guix image's entrypoint starts the guix-daemon before
      #      running our command, so we override the entrypoint to a plain
      #      bash shell and start the daemon ourselves – this gives us full
      #      control and works regardless of entrypoint variations between
      #      guix/guix image versions.
      #   2. guix system image --image-type=docker produces a compressed tar
      #      archive in the Guix store and prints its path to stdout.
      #   3. We copy that tarball to the /guix-output volume so it survives
      #      the container exit (--rm cleans up the container automatically).
      #
      # --privileged is required so that the Guix daemon can use Linux user
      # namespaces for isolated builds.
      # -----------------------------------------------------------------------
      - name: Create output directory
        run: mkdir -p "${{ github.workspace }}/guix-output"

      - name: Build Docker image tarball inside Guix bootstrap container
        run: |
          docker run --rm --privileged \
            --volume "${{ github.workspace }}:/workspace:ro" \
            --volume "${{ github.workspace }}/guix-output:/guix-output" \
            --entrypoint "/var/guix/profiles/per-user/root/current-guix/bin/bash" \
            guix/guix \
            -c '
              set -euo pipefail

              GUIX_PROFILE=/var/guix/profiles/per-user/root/current-guix
              export PATH="${GUIX_PROFILE}/bin:${PATH}"
              export GUIX_LOCPATH="${GUIX_PROFILE}/lib/locale"
              export SSL_CERT_DIR="${GUIX_PROFILE}/etc/ssl/certs"
              export SSL_CERT_FILE="${SSL_CERT_DIR}/ca-certificates.crt"

              # Start the Guix daemon in the background.
              guix-daemon --build-users-group=guixbuild \
                          --no-substitutes-for='' \
                          2>/dev/null &
              DAEMON_PID=$!

              # Wait until the daemon socket appears (up to 30 s).
              for i in $(seq 1 30); do
                test -S /var/guix/daemon-socket/socket && break
                sleep 1
              done
              if ! test -S /var/guix/daemon-socket/socket; then
                echo "ERROR: Guix daemon socket did not appear." >&2
                exit 1
              fi
              echo "Guix daemon is ready (pid ${DAEMON_PID})."

              # Build the Docker image tarball.
              TARBALL=$(guix system image \
                          --image-type=docker \
                          /workspace/.github/guix-dev-docker.scm)

              if [ -z "${TARBALL}" ]; then
                echo "ERROR: guix system image produced no output." >&2
                exit 1
              fi
              echo "Tarball: ${TARBALL}"

              # Copy to the shared output volume so the host can access it.
              cp "${TARBALL}" /guix-output/guix-dev-image.tar.gz
              echo "Copied tarball to /guix-output/guix-dev-image.tar.gz"
            '

      - name: Verify tarball
        run: |
          echo "Tarball size: $(du -sh "${{ github.workspace }}/guix-output/guix-dev-image.tar.gz" | cut -f1)"

      # -----------------------------------------------------------------------
      # Load the tarball into Docker and tag it.
      # -----------------------------------------------------------------------
      - name: Load image into Docker
        id: load
        run: |
          # 'docker load' outputs either:
          #   "Loaded image: <name>:<tag>"  – tarball has repo tags
          #   "Loaded image ID: sha256:..."  – no repo tags (typical for Guix)
          # Handle both formats; fall back to the most-recently-loaded image ID.
          LOADED=$(docker load -i "${{ github.workspace }}/guix-output/guix-dev-image.tar.gz" \
            | grep -oP '(?<=Loaded image( ID)?: ).*' || true)
          if [ -z "${LOADED}" ]; then
            LOADED=$(docker images -q | head -1)
          fi
          if [ -z "${LOADED}" ]; then
            echo "ERROR: could not determine loaded image tag/ID." >&2
            exit 1
          fi
          echo "loaded_tag=${LOADED}" >> "$GITHUB_OUTPUT"

      - name: Tag image
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker tag "${{ steps.load.outputs.loaded_tag }}" "${IMAGE_TAG}:latest"
          docker tag "${{ steps.load.outputs.loaded_tag }}" "${IMAGE_TAG}:${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Push to GitHub Container Registry
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == true }}
        run: |
          docker push "${IMAGE_TAG}:latest"
          docker push "${IMAGE_TAG}:${SHORT_SHA}"
          echo "Pushed ${IMAGE_TAG}:latest and ${IMAGE_TAG}:${SHORT_SHA}"
