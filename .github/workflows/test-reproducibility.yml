name: Reproducibility test — Guix Docker image

# NOT official Guix project CI.
# Personal workflow for the kromka-chleba/guix development branch.
#
# Verifies that the two Guix Docker image build paths produce identical output:
#
#   Build 1 — bootstrap path  (build-image.scm)
#     Simulates building from a native Guix installation.  The bootstrap
#     container is used as the Guix environment; build-image.scm is called
#     directly (without the `guix shell -D guix` wrapper).
#
#   Build 2 — container-rebuild path  (build-image-in-docker.scm)
#     The steady-state CI path.  build-image-in-docker.scm creates its own
#     temporary container, wraps the build in `guix shell -D guix`, and calls
#     build-image.scm inside that shell.
#
# Both paths call `./pre-inst-env guile build-image.scm` → `guix system image`.
# Guix's reproducibility guarantee requires both to produce bit-for-bit
# identical tarballs.  A SHA-256 mismatch means something in our setup breaks
# that guarantee and needs to be investigated.
#
# The test is intentionally NOT part of the main docker-image.yml workflow
# because it doubles the build time.  Run it:
#   • manually via workflow_dispatch (Actions → "Run workflow"), or
#   • on a schedule (weekly by default, comment out to disable).
#
# See .github/docker/test-reproducibility.scm for the orchestration script.

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: "0 6 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/guix-dev
  SYSTEM_CONFIG: .github/docker/guix-dev-system.scm

jobs:
  reproducibility-test:
    name: Reproducibility test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Both builds use the same published bootstrap image as the Guix
      # environment.  Build 1 calls build-image.scm directly (bootstrap
      # path).  Build 2 goes through build-image-in-docker.scm, which adds
      # the `guix shell -D guix` wrapper (container-rebuild path).
      # ------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull bootstrap image
        run: |
          if ! docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest; then
            echo "::error::No bootstrap image found in GHCR. See .github/README-docker.md for first-time bootstrap instructions."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Guile is required by test-reproducibility.scm on the runner.
      # ------------------------------------------------------------------
      - name: Install Guile on runner
        run: sudo apt-get install -y --no-install-recommends guile-3.0

      # ------------------------------------------------------------------
      # Prepare the build system on the runner.
      #
      # bootstrap/configure/make must be run BEFORE the test script because
      # the Scheme scripts no longer run them inside the container.  Running
      # them inside the container as root would leave root-owned files in the
      # bind-mounted workspace.  Here we use `--user` so that all generated
      # files (pre-inst-env, Makefile, compiled .go files, etc.) are owned by
      # the runner user, not root.
      # ------------------------------------------------------------------
      - name: Prepare build system
        run: |
          docker run --rm --privileged \
            -v "$PWD:$PWD" -w "$PWD" \
            --user "$(id -u):$(id -g)" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            /bin/sh -c \
              'export PATH=/run/current-system/profile/bin:$PATH && \
               guix shell -D guix -- sh -c \
                 "./bootstrap && ./configure --localstatedir=/var && make"'

      # ------------------------------------------------------------------
      # Run test-reproducibility.scm.
      #
      # The script:
      #   1. Starts the bootstrap container; calls build-image.scm directly
      #      (bootstrap path — simulates native Guix).  Output: repro-bootstrap.tar.gz
      #   2. Invokes build-image-in-docker.scm, which starts its own container
      #      and wraps the build in `guix shell -D guix`
      #      (container-rebuild path).  Output: repro-container.tar.gz
      #   3. Compares SHA-256 of both tarballs; exits non-zero on mismatch.
      # ------------------------------------------------------------------
      - name: Run reproducibility test
        run: |
          guile .github/docker/test-reproducibility.scm \
            --bootstrap-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --system-config ${{ env.SYSTEM_CONFIG }}
